<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game - Digital Diary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

<div class="outer-box">
  <h1> Number Guessing Game</h1>
  <button id="heading-title"> start Game</button>
  <h5>Let's Play!!</h5>
  <div class="inner-box">
    <label for="userGuessNumber"> Guess a Number : </label>
    <input type="text" name="" id="userGuessNumber" placeholder="Enter your guess">

    <button id="numberGuessingGameBtn" >Submit Guess</button>
    <p> Previous guesses : <span id="showUserGuess">  </span></p>
    <p> Guesses remaining : <span id="showRemainingGuesses"> 10 </span></p>
    <p><span id="showMessage">  </span></p>
  </div>
</div>


  <script src="index.js"></script>
</body>
</html>
